<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eid Mubarak 🌙</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Amiri:wght@400;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0a1a;font-family:'Amiri',serif;overflow-x:hidden;min-height:100vh;}
.stars{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;}
.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle var(--d) ease-in-out infinite alternate;}
@keyframes twinkle{from{opacity:.2;}to{opacity:1;}}
.screen{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 16px;transition:opacity .7s ease,transform .7s ease;}
.screen.hidden{opacity:0;pointer-events:none;transform:scale(1.04);}
/* S1 */
#s1{background:radial-gradient(ellipse at 50% 30%,#1a0a2e 0%,#0a0a1a 70%);}
.moon{width:90px;height:90px;background:radial-gradient(circle at 35% 35%,#fff8d0,#f5c842);border-radius:50%;box-shadow:0 0 40px 15px rgba(245,200,66,.5),inset -16px -8px 0 #f0a800;animation:glow 3s ease-in-out infinite alternate;margin-bottom:14px;}
@keyframes glow{from{box-shadow:0 0 40px 15px rgba(245,200,66,.4),inset -16px -8px 0 #f0a800;}to{box-shadow:0 0 70px 25px rgba(245,200,66,.7),inset -16px -8px 0 #f0a800;}}
.arabic{font-family:'Amiri',serif;font-size:clamp(26px,8vw,50px);color:#f5c842;direction:rtl;text-shadow:0 0 20px rgba(245,200,66,.5);margin-bottom:6px;text-align:center;}
.big-title{font-family:'Playfair Display',serif;font-size:clamp(34px,11vw,64px);font-weight:700;background:linear-gradient(135deg,#f5c842,#ff9a3c,#f5c842);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;letter-spacing:2px;margin-bottom:28px;}
.open-btn{background:linear-gradient(135deg,#f5c842,#ff9a3c);border:none;padding:15px 42px;border-radius:50px;font-family:'Dancing Script',cursive;font-size:22px;color:#1a0a2e;font-weight:700;cursor:pointer;box-shadow:0 0 30px rgba(245,200,66,.4);transition:transform .2s,box-shadow .2s;}
.open-btn:hover{transform:scale(1.08);box-shadow:0 0 50px rgba(245,200,66,.7);}
.stars-row{font-size:20px;letter-spacing:10px;color:rgba(245,200,66,.5);margin-top:18px;}
/* S2 */
#s2{background:radial-gradient(ellipse at 50% 30%,#0d1f0d 0%,#0a0a1a 70%);}
.dua-label{font-family:'Dancing Script',cursive;font-size:15px;color:rgba(255,255,255,.4);letter-spacing:4px;text-transform:uppercase;margin-bottom:12px;}
.dua-box{background:rgba(255,255,255,.04);border:1px solid rgba(100,220,100,.2);border-radius:20px;padding:26px 28px;max-width:440px;width:100%;position:relative;}
.dua-box::before{content:'';position:absolute;top:0;left:10%;right:10%;height:2px;background:linear-gradient(90deg,transparent,#6ddc6d,transparent);}
.dua-title{font-family:'Playfair Display',serif;font-size:clamp(20px,5vw,28px);color:#6ddc6d;text-align:center;margin-bottom:14px;text-shadow:0 0 20px rgba(109,220,109,.4);}
.dua-text{color:rgba(255,255,255,.85);font-size:16px;line-height:2;text-align:center;}
.dua-text em{color:#a8f0a8;font-style:italic;}
.dua-arabic{font-family:'Amiri',serif;font-size:21px;color:#6ddc6d;direction:rtl;text-align:center;margin-top:12px;opacity:.8;}
.nav-row{display:flex;gap:14px;margin-top:22px;flex-wrap:wrap;justify-content:center;}
.nav-btn{background:linear-gradient(135deg,#6ddc6d,#00a850);border:none;padding:12px 28px;border-radius:50px;font-family:'Dancing Script',cursive;font-size:19px;color:#fff;cursor:pointer;box-shadow:0 0 20px rgba(109,220,109,.3);transition:transform .2s;}
.nav-btn:hover{transform:scale(1.06);}
.back-btn{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);padding:10px 22px;border-radius:50px;font-size:14px;color:rgba(255,255,255,.5);cursor:pointer;transition:all .2s;font-family:'Amiri',serif;}
.back-btn:hover{background:rgba(255,255,255,.12);color:#fff;}
/* PIC SCREENS */
.pic-screen{background:#0a0a1a;}
.pic-top{font-family:'Dancing Script',cursive;font-size:14px;color:rgba(255,255,255,.4);letter-spacing:3px;text-transform:uppercase;margin-bottom:10px;}
.pic-frame{position:relative;border-radius:18px;overflow:hidden;border:2px solid rgba(245,200,66,.3);box-shadow:0 0 40px rgba(245,200,66,.12);max-width:320px;width:88vw;}
.pic-frame img{width:100%;display:block;max-height:52vh;object-fit:cover;}
.pic-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,0) 35%,rgba(0,0,0,.65) 100%);}
.pic-doodle{position:absolute;top:10px;left:0;right:0;display:flex;justify-content:center;gap:8px;flex-wrap:wrap;padding:0 10px;}
.tag{background:rgba(255,255,255,.15);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.3);border-radius:30px;padding:4px 12px;font-family:'Dancing Script',cursive;font-size:15px;color:#fff;}
.tag.gold{background:rgba(245,200,66,.2);border-color:rgba(245,200,66,.5);color:#f5c842;}
.pic-caption{position:absolute;bottom:12px;left:0;right:0;text-align:center;font-family:'Playfair Display',serif;font-size:clamp(18px,5vw,26px);color:#f5c842;font-style:italic;text-shadow:0 2px 10px rgba(0,0,0,.8);}
.pic-nav{display:flex;gap:12px;margin-top:18px;justify-content:center;align-items:center;flex-wrap:wrap;}
.pic-btn{background:linear-gradient(135deg,#f5c842,#ff9a3c);border:none;padding:12px 26px;border-radius:50px;font-family:'Dancing Script',cursive;font-size:19px;color:#1a0a2e;cursor:pointer;box-shadow:0 0 20px rgba(245,200,66,.3);transition:transform .2s;}
.pic-btn:hover{transform:scale(1.06);}
/* S6 */
#s6{background:radial-gradient(ellipse at 50% 40%,#1a0820 0%,#0a0a1a 70%);}
.end-title{font-family:'Playfair Display',serif;font-size:clamp(26px,8vw,48px);font-weight:700;background:linear-gradient(135deg,#f5c842,#ff9a3c,#f5c842);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;margin-bottom:14px;}
.end-sub{color:rgba(255,255,255,.6);font-size:17px;text-align:center;line-height:2;margin-bottom:18px;}
.end-emoji{font-size:30px;letter-spacing:10px;text-align:center;}
.restart-btn{margin-top:22px;background:rgba(255,255,255,.06);border:1px solid rgba(245,200,66,.2);padding:11px 28px;border-radius:50px;font-size:14px;color:rgba(245,200,66,.6);cursor:pointer;font-family:'Amiri',serif;transition:all .2s;}
.restart-btn:hover{background:rgba(245,200,66,.1);color:#f5c842;}
/* Dots */
.dots{display:flex;gap:8px;margin-bottom:18px;}
.dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.2);transition:background .4s;}
.dot.active{background:#f5c842;}
/* Petals */
.petals{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:5;}
.petal{position:absolute;top:-20px;animation:fall var(--d) linear var(--del) infinite;opacity:.6;font-size:var(--fs);}
@keyframes fall{0%{transform:translateY(-30px) rotate(0deg);opacity:0;}10%{opacity:.6;}90%{opacity:.4;}100%{transform:translateY(110vh) rotate(720deg);opacity:0;}}
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="petals" id="petals"></div>

<!-- S1 Welcome -->
<div class="screen" id="s1">
  <div class="dots"><div class="dot active"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
  <div class="moon"></div>
  <div class="arabic">عيد مبارك</div>
  <div class="big-title">Eid Mubarak</div>
  <button class="open-btn" onclick="goTo(2)">✨ Open ✨</button>
  <div class="stars-row">🌙 ⭐ 🌙 ⭐ 🌙</div>
</div>

<!-- S2 Dua -->
<div class="screen hidden" id="s2">
  <div class="dots"><div class="dot"></div><div class="dot active"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
  <div class="dua-label">✦ Special Dua ✦</div>
  <div class="dua-box">
    <div class="dua-title">🤲 Aapke Liye Dua</div>
    <div class="dua-text">
      May Allah bless you with<br>
      <em>happiness, health & peace</em><br><br>
      Aapki har khwahish poori ho,<br>
      <em>har mushkil aasaan ho jaye</em><br><br>
      May Allah accept all your<br>
      <em>secret prayers & duas</em> 🌸<br><br>
      <em>Ameen Ya Rabbul Aalameen</em>
    </div>
    <div class="dua-arabic">آمین یا رب العالمین 🤍</div>
  </div>
  <div class="nav-row">
    <button class="nav-btn" onclick="goTo(3)">See Pics 📸</button>
    <button class="back-btn" onclick="goTo(1)">← Back</button>
  </div>
</div>
